<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q3 Skills Test</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:url("https://images.unsplash.com/photo-1505740420928-5e560c06d30e");
            background-size:cover;
            background-position:center;
            font-family:Arial;
        }

        .card{
            background:rgba(0, 200, 255, 0.5);
            border-radius:15px;
            padding:20px;
        }

        .profile{
            width:120px;
            border-radius:50%;
        }
    </style>
</head>

<body>

<div class="container mt-5">
<div class="row justify-content-center">

<div class="col-md-5">

<div class="card">

<h1 class="text-center">REGISTRATION</h1>

<p>Please fill out all required fields in the registration form.</p>


<div class="text-center mb-3">
<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile">
</div>


<label>Upload Photo</label>
<input type="file" class="form-control mb-3">


<label>First Name</label>
<input type="text" id="fname" class="form-control mb-2">

<label>Last Name</label>
<input type="text" id="lname" class="form-control mb-2">

<label>Age</label>
<input type="number" id="age" class="form-control mb-2">

<label>Contact Number</label>
<input type="text" id="contact" class="form-control mb-2">

<label>Email</label>
<input type="email" id="email" class="form-control mb-2">

<label>Username</label>
<input type="text" id="user" class="form-control mb-2">

<label>Password</label>
<input type="password" id="pass" class="form-control mb-3">


<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
I accept the <a href="https://www.w3schools.com">Terms of Use</a>
</label>
</div>

<br>


<button onclick="createAccount()" class="btn btn-primary w-100">
Create my account
</button>

<button class="btn btn-secondary w-100 mt-2">
Cancel
</button>

</div>
</div>
</div>
</div>

<footer class="text-center text-light mt-3">
Carlos Aguas | 9 & Ruby ©2026
</footer>

<script>


function createAccount(){

    
    let fname = document.getElementById("fname").value
    let lname = document.getElementById("lname").value

   
    alert("Account created for " + fname + " " + lname)

}

</script>

</body>
</html>
